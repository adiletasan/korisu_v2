services:
  - type: web
    name: korisu-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://korisu-api.onrender.com
      - key: VITE_LIVEKIT_URL
        sync: false

  - type: web
    name: korisu-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    rootDir: services/api_gateway
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: korisu-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://korisu-frontend.onrender.com
      - key: API_URL
        value: https://korisu-api.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: CHAT_SERVICE_URL
        value: https://korisu-chat.onrender.com
      - key: CONFERENCE_SERVICE_URL
        value: https://korisu-conference.onrender.com

  - type: web
    name: korisu-chat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    rootDir: services/chat_service
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: korisu-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://korisu-frontend.onrender.com

  - type: web
    name: korisu-conference
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    rootDir: services/conference_service
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: korisu-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://korisu-frontend.onrender.com
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false

databases:
  - name: korisu-db
    plan: free
    databaseName: korisu_db
    user: korisu
